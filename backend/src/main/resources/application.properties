spring.application.name=online-exam
server.port=8081

# DataSource settings
# 请将 your_password_here 替换为您的数据库密码
# 请确保您已创建名为 online_exam 的数据库
spring.datasource.url=jdbc:mysql://localhost:3306/online_exam?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=YourNewPassword

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT settings
app.jwtSecret=======================bezKoder=SecretKey=======================
app.jwtExpirationMs=86400000
